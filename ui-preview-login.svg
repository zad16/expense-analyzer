<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1220" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091110"/>
      <stop offset="1" stop-color="#06100F"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#12231F"/>
      <stop offset="1" stop-color="#0D1C18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="200" fill="#6EE7B7" fill-opacity="0.09"/>
  <circle cx="1220" cy="760" r="170" fill="#3B82F6" fill-opacity="0.08"/>

  <rect x="160" y="118" width="1080" height="664" rx="32" fill="url(#panel)" stroke="#253933" filter="url(#shadow)"/>
  <rect x="160" y="118" width="610" height="664" rx="32" fill="#133029" fill-opacity="0.46"/>
  <line x1="770" y1="118" x2="770" y2="782" stroke="#253933"/>

  <rect x="214" y="172" width="52" height="52" rx="16" fill="#15362E" stroke="#2E6F59"/>
  <text x="240" y="204" text-anchor="middle" fill="#6EE7B7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">VLT</text>
  <text x="286" y="188" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">PERSONAL FINANCE DESK</text>
  <text x="286" y="219" fill="#EDF4F1" font-family="Georgia, serif" font-size="30" font-weight="600">Vault</text>

  <text x="214" y="318" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">SECURE ACCESS</text>
  <text x="214" y="374" fill="#EDF4F1" font-family="Georgia, serif" font-size="52" font-weight="600">A calmer way</text>
  <text x="214" y="430" fill="#EDF4F1" font-family="Georgia, serif" font-size="52" font-weight="600">to inspect your</text>
  <text x="214" y="486" fill="#EDF4F1" font-family="Georgia, serif" font-size="52" font-weight="600">money habits.</text>
  <text x="214" y="530" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="16">Unlock the dashboard to review monthly savings, explore</text>
  <text x="214" y="554" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="16">specific spending patterns, and ask natural-language</text>
  <text x="214" y="578" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="16">questions across your Cashew backup data.</text>

  <rect x="214" y="620" width="162" height="86" rx="18" fill="#152823" stroke="#233A34"/>
  <text x="234" y="648" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">WHAT YOU CAN ASK</text>
  <text x="234" y="690" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Trends and</text>
  <text x="234" y="712" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">comparisons</text>

  <rect x="390" y="620" width="162" height="86" rx="18" fill="#152823" stroke="#233A34"/>
  <text x="410" y="648" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">GOOD FOR</text>
  <text x="410" y="690" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Item and category</text>
  <text x="410" y="712" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">searches</text>

  <rect x="566" y="620" width="162" height="86" rx="18" fill="#152823" stroke="#233A34"/>
  <text x="586" y="648" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">OUTPUT STYLE</text>
  <text x="586" y="690" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Readable</text>
  <text x="586" y="712" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">summaries</text>

  <text x="834" y="266" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">UNLOCK WORKSPACE</text>
  <text x="834" y="322" fill="#EDF4F1" font-family="Georgia, serif" font-size="44" font-weight="600">Enter your PIN</text>
  <text x="834" y="360" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="15">Use the PIN configured for this app to open your finance dashboard.</text>

  <text x="834" y="438" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.6">SECURITY PIN</text>
  <rect x="834" y="456" width="344" height="84" rx="22" fill="#13241F" stroke="#27423A"/>
  <text x="1006" y="509" text-anchor="middle" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="12">....</text>

  <rect x="834" y="570" width="344" height="56" rx="28" fill="#18362D" stroke="#2C6A57"/>
  <text x="1006" y="605" text-anchor="middle" fill="#EDF4F1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Unlock Vault</text>

  <text x="1006" y="664" text-anchor="middle" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="13">This screen does not change your data. It only gates access</text>
  <text x="1006" y="685" text-anchor="middle" fill="#8DA49A" font-family="Inter, Arial, sans-serif" font-size="13">to the dashboard.</text>
</svg>
